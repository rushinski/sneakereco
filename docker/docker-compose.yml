services:
  postgres:
    image: postgres:18
    container_name: sneakereco-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sneakereco_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sneakereco-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sneakereco.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy

  valkey:
    image: valkey/valkey:8
    container_name: sneakereco-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

  minio:
    image: minio/minio:latest
    container_name: sneakereco-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-setup:
    image: minio/mc:latest
    container_name: sneakereco-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...';
        sleep 1;
      done;
      /usr/bin/mc mb local/sneakereco-dev --ignore-existing;
      /usr/bin/mc anonymous set download local/sneakereco-dev;
      exit 0;
      "

volumes:
  postgres_data:
  pgadmin_data:
  valkey_data:
  minio_data: