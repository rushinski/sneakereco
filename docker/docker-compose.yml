services:
  postgres:
    image: postgres:18
    container_name: sneakereco-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sneakereco_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    container_name: sneakereco-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: sneakereco-mailpit
    ports:
      - "8025:8025"   # Web UI → http://localhost:8025
      - "1025:1025"   # SMTP — NestJS dev transport sends here
    restart: unless-stopped

  # Optional local HTTPS proxy — mirrors production TLS so Secure cookies and
  # CSP work exactly as in production. See docs/local-dev-setup.md.
  #
  # Prerequisites: mkcert certs must exist at ./certs/ before starting.
  # Start with: docker compose --profile https up caddy
  caddy:
    image: caddy:2
    profiles: [https]
    container_name: sneakereco-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  valkey_data:
  caddy_data:
