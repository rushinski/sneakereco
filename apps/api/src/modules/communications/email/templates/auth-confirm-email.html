<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify your email</title>
</head>
<body style="margin:0;padding:0;background:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a0a;padding:48px 24px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">
          <tr>
            <td style="padding-bottom:28px;">
              <p style="margin:0;font-size:18px;font-weight:700;color:#ffffff;letter-spacing:-0.3px;">{{tenantName}}</p>
            </td>
          </tr>
          <tr>
            <td style="background:#141414;border-radius:12px;padding:40px;border:1px solid #222;">
              <h1 style="margin:0 0 10px;font-size:26px;font-weight:700;color:#ffffff;letter-spacing:-0.5px;">Verify your email</h1>
              <p style="margin:0 0 28px;font-size:15px;color:#888;line-height:1.6;">Enter the code below to confirm your account. It expires in {{expiryMinutes}} minutes.</p>
              <div style="background:#0a0a0a;border-radius:8px;padding:24px 16px;text-align:center;margin-bottom:28px;border:1px solid #1f1f1f;">
                <span style="font-size:38px;font-weight:700;color:#ffffff;letter-spacing:10px;font-family:'Courier New',monospace;">{{code}}</span>
              </div>
              <p style="margin:0;font-size:13px;color:#555;line-height:1.6;">Didn't create an account with {{tenantName}}? You can safely ignore this email.</p>
            </td>
          </tr>
          <tr>
            <td style="padding-top:24px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#444;">© {{tenantName}} · Powered by SneakerEco</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
