<!DOCTYPE html>
<html lang="en">
<body style="font-family: sans-serif; color: #111;">
  <p>A new platform onboarding request was submitted.</p>
  <table cellpadding="6" cellspacing="0" style="border-collapse: collapse;">
    <tr>
      <td style="font-weight: bold; padding-right: 16px;">Business</td>
      <td>{{businessName}}</td>
    </tr>
    <tr>
      <td style="font-weight: bold; padding-right: 16px;">Name</td>
      <td>{{fullName}}</td>
    </tr>
    <tr>
      <td style="font-weight: bold; padding-right: 16px;">Email</td>
      <td>{{email}}</td>
    </tr>
    <tr>
      <td style="font-weight: bold; padding-right: 16px;">Phone</td>
      <td>{{phoneNumber}}</td>
    </tr>
    <tr>
      <td style="font-weight: bold; padding-right: 16px;">Instagram</td>
      <td>{{instagramHandle}}</td>
    </tr>
  </table>
</body>
</html>
